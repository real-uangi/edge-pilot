syntax = "proto3";

package edgepilot.grpcapi;

option go_package = "edge-pilot/internal/shared/grpcapi;grpcapi";

service AgentControl {
  rpc Connect(stream AgentMessage) returns (stream ControlMessage);
}

enum Slot {
  SLOT_UNSPECIFIED = 0;
  SLOT_BLUE = 1;
  SLOT_GREEN = 2;
}

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_DEPLOY_GREEN = 1;
  TASK_TYPE_SWITCH_TRAFFIC = 2;
  TASK_TYPE_ROLLBACK = 3;
  TASK_TYPE_CLEANUP_OLD = 4;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_RUNNING = 1;
  TASK_STATUS_SUCCEEDED = 2;
  TASK_STATUS_FAILED = 3;
}

message AgentMessage {
  oneof payload {
    HelloMessage hello = 1;
    HeartbeatMessage heartbeat = 2;
    TaskUpdate task_update = 3;
    StatsReport stats = 4;
  }
}

message ControlMessage {
  oneof payload {
    AckMessage ack = 1;
    TaskCommand task = 2;
    ProxyConfigSnapshot proxy_config = 3;
  }
}

message HelloMessage {
  string agent_id = 1;
  string token = 2;
  string version = 3;
  string hostname = 4;
  repeated string capabilities = 5;
}

message HeartbeatMessage {
  string agent_id = 1;
  repeated string running_task_ids = 2;
}

message AckMessage {
  string message = 1;
}

message VolumeMount {
  string source = 1;
  string target = 2;
  bool read_only = 3;
}

message PublishedPort {
  int32 host_port = 1;
  int32 container_port = 2;
}

message TaskCommand {
  string task_id = 1;
  string release_id = 2;
  string service_id = 3;
  string service_key = 4;
  string agent_id = 5;
  TaskType type = 6;
  string image_repo = 7;
  string image_tag = 8;
  string registry_host = 9;
  string registry_username = 10;
  string registry_secret = 11;
  string commit_sha = 12;
  string trace_id = 13;
  Slot target_slot = 14;
  Slot current_live_slot = 15;
  int32 container_port = 16;
  bool docker_health_check = 17;
  string http_health_path = 18;
  int32 http_expected_code = 19;
  int32 http_timeout_second = 20;
  string backend_name = 21;
  string server_name = 22;
  string previous_server = 23;
  map<string, string> env = 24;
  repeated string command = 25;
  repeated string entrypoint = 26;
  repeated VolumeMount volumes = 27;
  repeated PublishedPort published_ports = 28;
}

message TaskUpdate {
  string task_id = 1;
  TaskStatus status = 2;
  string step = 3;
  string error_message = 4;
  string container_id = 5;
  string listen_address = 6;
  Slot slot = 7;
  string server_name = 8;
  map<string, int64> metrics = 9;
}

message ProxyServiceConfig {
  string service_id = 1;
  string service_key = 2;
  string route_host = 3;
  string route_path_prefix = 4;
  string backend_name = 5;
  string blue_server_name = 6;
  string green_server_name = 7;
  int32 container_port = 8;
  Slot current_live_slot = 9;
}

message ProxyConfigSnapshot {
  string agent_id = 1;
  string frontend_name = 2;
  string default_backend = 3;
  int32 bind_port = 4;
  repeated ProxyServiceConfig services = 5;
}

message BackendStatPoint {
  string service_id = 1;
  string backend_name = 2;
  string server_name = 3;
  int64 scur = 4;
  int64 rate = 5;
  int64 error_requests = 6;
}

message StatsReport {
  string agent_id = 1;
  repeated BackendStatPoint services = 2;
}
